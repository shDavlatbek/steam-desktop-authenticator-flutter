name: sda_flutter
description: Steam Desktop Authenticator - Flutter Port
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # HTTP & Networking
  http: ^1.3.0

  # Crypto
  crypto: ^3.0.6
  pointycastle: ^3.9.1
  convert: ^3.1.2

  # JSON
  json_annotation: ^4.9.0

  # Storage & File I/O
  path_provider: ^2.1.5
  file_picker: ^8.1.7

  # UI & Platform
  window_manager: ^0.4.3
  tray_manager: ^0.2.3
  cached_network_image: ^3.4.1

  # Utility
  uuid: ^4.5.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  mockito: ^5.4.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
